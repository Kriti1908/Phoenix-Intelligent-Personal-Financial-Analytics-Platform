version: "3.9"

# Monolith deployment: only 2 containers (Postgres + App)
# vs. microservices: 9+ containers (Postgres, Redis, ClickHouse, 6 services, nginx)

networks:
  monolith_net:
    driver: bridge

volumes:
  monolith_pg_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: monolith-postgres
    environment:
      POSTGRES_DB: phoenix
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecretpassword}
    command: postgres -c max_connections=200
    volumes:
      - monolith_pg_data:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5434:5432"
    networks: [monolith_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 10s
      timeout: 5s
      retries: 5

  monolith-app:
    build: .
    container_name: phoenix-monolith
    environment:
      DATABASE_URL: postgresql+asyncpg://phoenix:${POSTGRES_PASSWORD:-supersecretpassword}@postgres:5432/phoenix
      JWT_SECRET: ${JWT_SECRET:-monolith-dev-secret-key-change-me}
      JWT_ACCESS_EXPIRE_MINUTES: 60
      ANOMALY_Z_THRESHOLD: "2.5"
      ANOMALY_MIN_TRANSACTIONS: "10"
    ports:
      - "9000:9000"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [monolith_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

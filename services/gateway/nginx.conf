worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    # Upstream backends
    upstream auth_backend         { server phoenix-auth:8001; }
    upstream ingestion_backend    { server phoenix-ingestion:8002; }
    upstream analytics_backend    { server phoenix-analytics:8003; }
    upstream anomaly_backend      { server phoenix-anomaly:8004; }
    upstream recommendation_backend { server phoenix-recommendation:8005; }
    upstream notification_backend { server phoenix-notification:8006; }
    upstream frontend_backend     { server phoenix-frontend:3000; }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # JWT validation sub-request
        location = /auth/validate {
            internal;
            proxy_pass http://auth_backend/internal/validate-token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # Protected API routes
        location /api/v1/ {
            auth_request /auth/validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_set_header X-User-ID $user_id;
            limit_req zone=api burst=20 nodelay;

            # Public Auth routes
            location ~ ^/api/v1/auth/(register|login|refresh)$ {
                auth_request off;
                rewrite ^/api/v1/auth/(.*)$ /$1 break;
                proxy_pass http://auth_backend;
            }

            # Protected Auth routes (e.g. /me)
            location /api/v1/auth/ {
                proxy_pass http://auth_backend/;
            }

            # Transaction routes — match with or without trailing slash
            location ^~ /api/v1/transactions {
                client_max_body_size 10m;
                proxy_pass http://ingestion_backend/transactions;
            }

            # Analytics routes
            location ^~ /api/v1/analytics/ {
                proxy_pass http://analytics_backend/;
            }

            # Dashboard routes (served by analytics)
            location ^~ /api/v1/dashboard/ {
                proxy_pass http://analytics_backend/dashboard/;
            }

            # Alert routes
            location ^~ /api/v1/alerts/ {
                proxy_pass http://anomaly_backend/alerts/;
            }

            # Recommendation routes
            location ^~ /api/v1/recommendations/ {
                proxy_pass http://recommendation_backend/recommendations/;
            }
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://notification_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Frontend SPA
        location / {
            proxy_pass http://frontend_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
